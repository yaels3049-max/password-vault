<!doctype html>
<html lang="he">
  <head>
    <meta charset="utf-8" />
    <title>כניסה לחשבון — סופרמרקט לדוגמה</title>
  </head>
  <body>
    <main>
      <h1>כניסה לחשבון</h1>
      <!-- Ordinary dedicated consumer login page (Shufersal-/HTZone-class path) -->
      <form action="/online/he/login" method="post">
        <label>
          שם משתמש
          <input type="text" name="username" autocomplete="username" />
        </label>
        <label>
          סיסמה
          <input type="password" name="password" autocomplete="current-password" />
        </label>
        <button type="submit">התחברות</button>
      </form>
    </main>
  </body>
</html>
