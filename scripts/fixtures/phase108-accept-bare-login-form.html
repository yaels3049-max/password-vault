<!doctype html>
<html lang="he">
  <head>
    <meta charset="utf-8" />
    <title>כניסה — HTZone-class</title>
  </head>
  <body>
    <main>
      <h1>התחברות</h1>
      <!-- Same-origin dedicated consumer /login with form (may persist) -->
      <form method="post" action="/login">
        <input type="email" name="email" autocomplete="username" />
        <input type="password" name="password" autocomplete="current-password" />
        <button type="submit">Login</button>
      </form>
    </main>
  </body>
</html>
