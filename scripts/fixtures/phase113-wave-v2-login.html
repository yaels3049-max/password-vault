<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phase 113 M8 — wave-v2 Login fixture</title>
    <style>
      :root {
        --app-wide-bg-image: url('../../src/assets/backgrounds/digital-home-shell-wave-v2.png');
        font-family: 'Assistant', system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #e8eef6;
      }
      .unlock.auth-entry {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        min-height: 100vh;
        padding: clamp(1.5rem, 6vh, 3.5rem) 1.25rem 2rem;
        background-color: #e8eef6;
        background-image: var(--app-wide-bg-image);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      }
      .unlock-card {
        width: 100%;
        max-width: 440px;
        padding: 2rem 1.5rem;
        background: #fff;
        border: 1px solid #e8e8e8;
        border-radius: 12px;
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.12);
        text-align: center;
      }
      h1 {
        margin: 0 0 0.5rem;
        color: #0f172a;
      }
      p {
        margin: 0;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="unlock auth-entry">
      <div class="unlock-card">
        <h1>כספת דיגיטלית</h1>
        <p>Login/Auth — wave-v2 shell background (AC-113-46)</p>
      </div>
    </div>
  </body>
</html>
