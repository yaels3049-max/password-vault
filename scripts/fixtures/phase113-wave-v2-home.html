<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phase 113 M8 — wave-v2 Home fixture</title>
    <style>
      :root {
        --app-shell-bg-image: url('../../src/assets/backgrounds/digital-home-shell-portrait.png');
        --app-shell-radius: 24px;
        font-family: 'Assistant', system-ui, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        background: #e8eef6;
      }
      .dashboard {
        max-width: 440px;
        margin: 1rem auto 2rem;
        padding: 2rem 1.25rem 3rem;
        min-height: calc(100vh - 4rem);
        border-radius: var(--app-shell-radius);
        overflow: hidden;
        background-color: #e8eef6;
        background-image: var(--app-shell-bg-image);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        box-shadow: 0 16px 40px rgba(120, 150, 185, 0.14);
      }
      h1 {
        margin: 0;
        text-align: center;
        color: #1e3a8a;
      }
      p {
        text-align: center;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <div class="dashboard">
      <h1>הבית הדיגיטלי</h1>
