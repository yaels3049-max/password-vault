<!doctype html>
<html lang="he">
  <head>
    <meta charset="utf-8" />
    <title>זאפ השוואת מחירים</title>
  </head>
  <body>
    <header>
      <nav>
        <!-- Alternate-audience business portal (subdomain) -->
        <a href="https://sa.example-retail.co.il/login/index?ReturnUrl=%2f">כניסה</a>
        <!-- Same-host clients portal — contains "login" but is NOT consumer entry -->
        <a href="https://www.example-retail.co.il/clientslogin.aspx?typeentry=3">LOGIN</a>
        <!-- Consumer login is a floating modal — no dedicated consumer login URL -->
        <button type="button" aria-haspopup="dialog">התחברות</button>
      </nav>
    </header>
    <a href="/login">כניסה לחשבון</a>
  </body>
</html>
