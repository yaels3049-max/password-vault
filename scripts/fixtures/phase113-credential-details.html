<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Phase 113 — Credential Details fixture (M10)</title>
    <style>
      :root {
        --app-font-family: 'Assistant', 'Segoe UI', sans-serif;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: var(--app-font-family);
        background: #e8eef6;
        color: #0f172a;
      }
      .shell {
        max-width: 792px;
        margin: 1.5rem auto;
        padding: 1.25rem;
        border-radius: 24px;
        background: #fff;
        min-height: 420px;
      }
      .modal-overlay.cd-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        display: flex;
        align-items: stretch;
        padding: 0.75rem;
        background: rgba(15, 23, 42, 0.35);
      }
      .cd-dialog {
        position: relative;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 580px;
        max-height: min(92vh, 720px);
        margin: auto;
        padding: 0;
        overflow: hidden;
        border-radius: 18px;
        border: 1px solid rgba(37, 99, 235, 0.28);
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 18px 48px rgba(15, 23, 42, 0.18);
      }
      .cd-header {
        position: sticky;
        top: 0;
        z-index: 2;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: start;
        gap: 0.55rem;
        padding: 0.85rem 0.9rem;
        background: rgba(248, 250, 252, 0.96);
        border-bottom: 1px solid #e2e8f0;
      }
      .cd-header-text {
        min-width: 0;
        text-align: start;
      }
      .cd-header-start {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .cd-close {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 40px;
        height: 40px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        background: #fff;
        color: #334155;
        font-size: 1.1rem;
      }
      .cd-title {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 700;
        color: #1e3a8a;
      }
      .cd-subtitle {
        margin: 0.15rem 0 0;
        font-size: 0.875rem;
        color: #64748b;
      }
      .vault-state-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.25rem 0.55rem;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        color: #1d4ed8;
      }
      .vault-state-badge-dot {
        width: 0.45rem;
        height: 0.45rem;
        border-radius: 50%;
        background: #2563eb;
      }
      .vault-state-badge-lock {
        border: none;
        background: transparent;
        color: inherit;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
        text-decoration: underline;
        text-underline-offset: 2px;
      }
      .cd-body {
        padding: 1rem;
        overflow-y: auto;
      }
      .cd-identity {
        display: flex;
        align-items: center;
        gap: 0.7rem;
        margin-bottom: 0.85rem;
      }
      .cd-identity-icon--letter {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: #1d4ed8;
        background: #dbeafe;
      }
      .cd-identity-name {
        font-weight: 700;
      }
      .cd-identity-category {
        font-size: 0.8125rem;
        color: #64748b;
      }
      .cd-profiles {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 0.85rem;
      }
      .cd-chip {
        padding: 0.35rem 0.7rem;
        border-radius: 999px;
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        font-size: 0.8125rem;
        font-weight: 600;
      }
      .cd-chip--active {
        color: #fff;
        background: #2563eb;
        border-color: #2563eb;
      }
      .cd-field {
        display: flex;
        flex-direction: column;
        gap: 0.3rem;
        margin-bottom: 0.75rem;
      }
      .cd-field-label {
        font-size: 0.875rem;
        font-weight: 650;
        color: #1e3a8a;
      }
      .cd-field-row {
        display: flex;
        align-items: center;
        gap: 0.35rem;
      }
      .cd-field-input {
        flex: 1;
        padding: 0.6rem 0.7rem;
        border: 1px solid #d5d9e0;
        border-radius: 10px;
        font: inherit;
      }
      .cd-icon-btn {
        width: 36px;
        height: 36px;
        border: 1px solid #e2e8f0;
        border-radius: 10px;
        background: #fff;
        color: #2563eb;
      }
      .cd-save {
        width: 100%;
        padding: 0.7rem 1rem;
        border: none;
        border-radius: 12px;
        background: #2563eb;
        color: #fff;
        font: inherit;
        font-weight: 700;
      }
      .cd-save:disabled {
        opacity: 0.45;
      }
      .cd-secondary-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.35rem 0.75rem;
        margin-top: 0.75rem;
        padding-top: 0.65rem;
        border-top: 1px solid #eef2f7;
      }
      .cd-secondary-btn {
        border: none;
        background: none;
        padding: 0;
        font: inherit;
        font-size: 0.8125rem;
        font-weight: 600;
        color: #64748b;
        text-decoration: underline;
        text-underline-offset: 2px;
        cursor: pointer;
      }
      .cd-secondary-btn--danger {
        color: #be123c;
      }
      .cd-add-toggle {
        margin-top: 1rem;
        width: 100%;
        padding: 0.55rem 0.75rem;
        border: 1px dashed #cbd5e1;
        border-radius: 10px;
        background: transparent;
        color: #475569;
        font: inherit;
        font-weight: 600;
      }
      @media (max-width: 560px) {
        .cd-overlay {
          padding: 0;
        }
        .cd-dialog {
          max-width: none;
          max-height: 100vh;
          height: 100%;
          border-radius: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <p>ניהול אתרים — מוקאפ M10 (X + נעל, ללא ⋮)</p>
    </div>
    <div class="modal-overlay cd-overlay">
      <div class="cd-dialog" role="dialog" aria-modal="true" aria-labelledby="cd-title">
        <header class="cd-header">
          <div class="cd-header-text">
            <h2 id="cd-title" class="cd-title">פרטי כניסה</h2>
          </div>
          <div class="cd-header-start">
            <div class="vault-state-badge" role="status">
              <span class="vault-state-badge-dot" aria-hidden="true"></span>
              <span>הגישה פתוחה</span>
              <button type="button" class="vault-state-badge-lock">נעל</button>
            </div>
            <button type="button" class="cd-close" aria-label="סגירה">✕</button>
          </div>
        </header>
        <div class="cd-body">
          <div class="cd-identity">
            <span class="cd-identity-icon--letter">ב</span>
            <div>
              <div class="cd-identity-name">ביטוח לאומי</div>
              <div class="cd-identity-category">ממשל</div>
            </div>
          </div>
          <div class="cd-profiles" role="tablist">
            <span class="cd-chip cd-chip--active">ראשי · ברירת מחדל</span>
          </div>
          <label class="cd-field">
            <span class="cd-field-label">שם משתמש</span>
            <div class="cd-field-row">
              <input class="cd-field-input" value="demo.user" readonly />
              <button type="button" class="cd-icon-btn" aria-label="העתקת שם משתמש">⧉</button>
            </div>
          </label>
          <label class="cd-field">
            <span class="cd-field-label">סיסמה</span>
            <div class="cd-field-row">
              <input class="cd-field-input" type="password" value="secret" readonly />
              <button type="button" class="cd-icon-btn" aria-label="הצגת סיסמה">👁</button>
              <button type="button" class="cd-icon-btn" aria-label="העתקת סיסמה">⧉</button>
            </div>
          </label>
          <button type="button" class="cd-save" disabled>שמירת שינויים</button>
          <div class="cd-secondary-actions">
            <button type="button" class="cd-secondary-btn">שינוי שם פרופיל</button>
            <button type="button" class="cd-secondary-btn cd-secondary-btn--danger">
              מחיקת פרטי כניסה
            </button>
          </div>
          <button type="button" class="cd-add-toggle">+ הוספת פרופיל נוסף</button>
        </div>
      </div>
    </div>
  </body>
</html>
