<!doctype html>
<html lang="he">
  <head>
    <meta charset="utf-8" />
    <title>התחברות</title>
  </head>
  <body>
    <h1>כניסה לחשבון</h1>
    <form action="/login" method="post">
      <label>
        שם משתמש
        <input type="text" name="username" autocomplete="username" />
      </label>
      <label>
        סיסמה
        <input type="password" name="password" autocomplete="current-password" />
      </label>
      <button type="submit">התחבר</button>
    </form>
  </body>
</html>
