<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>דמו התחברות</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 360px;
        margin: 3rem auto;
        padding: 1.5rem;
      }
      label {
        display: block;
        margin-bottom: 1rem;
      }
      span {
        display: block;
        margin-bottom: 0.25rem;
        font-weight: 600;
      }
      input {
        width: 100%;
        padding: 0.5rem;
        font-size: 1rem;
      }
      h1 {
        font-size: 1.25rem;
        margin-bottom: 1.5rem;
      }
      .demo-note {
        font-size: 0.875rem;
        color: #475569;
        margin: -0.75rem 0 1.25rem;
        line-height: 1.45;
      }
      button[type='submit'] {
        width: 100%;
        margin-top: 0.5rem;
        padding: 0.625rem;
        font-size: 1rem;
        font-weight: 600;
        background: #2563eb;
        color: #fff;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }
      #login-done {
        margin-top: 1rem;
        padding: 0.75rem;
        background: #dbeafe;
        color: #1e40af;
        border-radius: 4px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <h1>דמו התחברות</h1>
    <p class="demo-note">לאחר המילוי האוטומטי, לחצו התחבר כדי להשלים בעצמכם.</p>
    <form id="login-form">
      <label>
        <span>שם משתמש</span>
        <input id="username" name="username" type="text" autocomplete="username" />
      </label>
      <label>
        <span>סיסמה</span>
        <input id="password" name="password" type="password" autocomplete="current-password" />
      </label>
      <button type="submit">התחבר</button>
    </form>
    <p id="login-done" hidden role="status">ההתחברות הושלמה — בחרתם להמשיך בעצמכם.</p>
    <script>
      document.getElementById('login-form').addEventListener('submit', function (event) {
        event.preventDefault();
        document.getElementById('login-done').hidden = false;
      });
    </script>
  </body>
</html>
