<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <title>Phase 112 M9 — email-first step 1 fixture</title>
  </head>
  <body>
    <h1>התחברות</h1>
    <form id="login-step-1" action="#" method="post">
      <label for="email">אימייל</label>
      <input
        id="email"
        name="email"
        type="email"
        autocomplete="email"
        placeholder="you@example.com"
      />
      <!-- Intentionally NO password field on step 1 (AC-112-25). -->
      <button type="button" id="continue-btn">המשך</button>
    </form>
  </body>
</html>
